# ============================================================
#  Fine-tuning Configuration
#  Edit this file to experiment — never touch the Python code.
# ============================================================

# --- Model ---
model:
  name: "Qwen/Qwen2.5-0.5B-Instruct"
  # Supported: Qwen/Qwen2.5-0.5B-Instruct, Qwen/Qwen2.5-1.5B-Instruct,
  #            Qwen/Qwen2.5-3B-Instruct, microsoft/Phi-3.5-mini-instruct,
  #            google/gemma-2-2b-it, meta-llama/Llama-3.2-1B-Instruct,
  #            meta-llama/Llama-3.2-3B-Instruct, HuggingFaceTB/SmolLM2-1.7B-Instruct
  output_dir: "./qwen-finetuned"
  merged_dir: "./qwen-finetuned-merged"  # For merge/export

# --- Quantization ---
quantization:
  load_in_4bit: true
  use_double_quant: true
  quant_type: "nf4"
  # compute_dtype is auto-set: bf16 if supported, else fp16

# --- LoRA ---
lora:
  r: 16               # Was 8 — higher rank = more capacity to learn
  alpha: 32            # Rule of thumb: alpha = 2 * r
  dropout: 0.05
  bias: "none"
  # target_modules auto-detected per model architecture

# --- Datasets ---
# Each entry: {name: HF dataset path, split: split name, max_samples: int}
# Set max_samples to null to use the full dataset.
datasets:
  - name: "timdettmers/openassistant-guanaco"
    split: "train"
    max_samples: 2500
  - name: "yahma/alpaca-cleaned"
    split: "train"
    max_samples: 2500

# --- Data Filtering ---
data:
  max_assistant_chars: 1500    # Was 300 — that was killing quality
  min_assistant_chars: 20      # Skip trivially short answers
  max_length: 512             # Was 256 — way too short for learning
  eval_split: 0.05             # 5% held out for validation

# --- Training ---
training:
  max_steps: 50                # Override epoch count — set to -1 to use num_epochs instead
  num_epochs: 2                # Only used when max_steps is -1
  batch_size: 1               # Per-device batch size
  gradient_accumulation_steps: 16  # Effective batch = 2*8 = 16
  learning_rate: 2.0e-5        # Was 1e-4 — TOO HIGH, was destroying model knowledge
  warmup_ratio: 0.06           # Percentage-based warmup instead of fixed steps
  lr_scheduler: "cosine"
  max_grad_norm: 0.3           # Gradient clipping — prevents catastrophic updates
  weight_decay: 0.01           # Regularization
  logging_steps: 5
  save_steps: 200
  eval_steps: 50               # Evaluate every N steps
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"
  neftune_noise_alpha: 5.0     # NEFTune: adds noise to embeddings, improves generalization
  report_to: "none"            # Set to "wandb" or "tensorboard" if desired

# --- System prompt used during data formatting ---
system_prompt: "You are a helpful, accurate assistant. Provide clear and informative responses."

# --- Abliteration (optional — removes refusal behavior) ---
# Run after merge.py: python3 abliterate.py
abliteration:
  enabled: false                              # Set to true to include in pipeline
  harmful_dataset: "allenai/wildjailbreak"    # 262K diverse harmful prompts (best results)
  # Alternatives: "mlabonne/harmful_behaviors" (416 samples, lighter)
  #               "JailbreakBench/JBB-Behaviors" (100 curated, fast)
  harmless_dataset: "mlabonne/harmless_alpaca"
  n_samples: 256                              # More = sharper refusal signal (256+ recommended)
  batch_size: 2                               # Reduce to 1 for <=2GB VRAM
  eval_candidates: 20                         # How many refusal directions to evaluate
  eval_prompts: 8                             # Test prompts per candidate (use all 8)
  output_dir: null                            # null = overwrite merged model in-place

# --- Chat inference ---
chat:
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9
  repetition_penalty: 1.1
  max_history_turns: 6         # Sliding window for conversation history